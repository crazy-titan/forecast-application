<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChainCast | Cyber-Industrial Intelligence</title>
    <!-- Google Fonts: Inter and JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body>

<header>
    <div class="container header-content">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            Chain<span>Cast</span>
            <div class="status-pill">TURBO ENGINE ACTIVE</div>
        </div>
        <nav class="hidden md-flex">
            <!-- Nav links would go here -->
        </nav>
    </div>
</header>

<main class="container">
    <section class="hero">
        <h1 class="hero-title">Industrial Forecasting Dashboard</h1>
        <p class="hero-subtitle">High-fidelity time-series intelligence for enterprise logistics and demand planning.</p>
    </section>

    <!-- STEP 1: DATA INGESTION -->
    <section class="dashboard-grid">
        <div class="card card-full" id="uploadCard">
            <div class="chart-header">
                <div class="chart-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                    DATA SOURCE
                </div>
            </div>
            
            <div id="drop-zone" class="upload-area">
                <p>Drag & Drop CSV / Excel or <span class="accent">Browse Files</span></p>
                <input type="file" id="fileInput" accept=".csv,.xlsx" hidden>
            </div>

            <!-- Mapping (Hidden until upload) -->
            <div id="mappingSection" class="hidden" style="margin-top: 2rem;">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
                    <div class="form-group">
                        <label>DATE COLUMN <span class="info-trigger" data-info="The temporal axis. Supports ISO, US/UK, and Unix.">ⓘ</span></label>
                        <select id="dateColSelect"></select>
                    </div>
                    <div class="form-group">
                        <label>VALUE COLUMN <span class="info-trigger" data-info="Numerical target for stochastic modelling.">ⓘ</span></label>
                        <select id="valueColSelect"></select>
                    </div>
                    <div class="form-group">
                        <label>SERIES ID (OPTIONAL) <span class="info-trigger" data-info="For cross-sectional SKU-level data.">ⓘ</span></label>
                        <select id="idColSelect"></select>
                    </div>
                </div>
                <button class="btn-primary" id="confirmMappingBtn" style="max-width: 200px; margin-top: 1rem;">CONNECT ENGINE →</button>
            </div>
        </div>

        <!-- STEP 2: RESULTS (SYMMETRICAL) -->
        <div class="card card-half" id="forecastResult">
            <div class="chart-header">
                <div class="chart-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2"><path d="M3 3v18h18M18 17l-6-6-4 4-5-5"/></svg>
                    DEMAND FORECAST
                </div>
                <div class="chart-toolbar" id="forecastToolbar">
                    <button class="btn-range" data-count="1" data-step="month">1M</button>
                    <button class="btn-range" data-count="6" data-step="month">6M</button>
                    <button class="btn-range active" data-count="1" data-step="year">1Y</button>
                    <button class="btn-range" data-count="2" data-step="year">2Y</button>
                    <button class="btn-range" data-count="5" data-step="year">5Y</button>
                    <button class="btn-range" data-step="all">ALL</button>
                </div>
            </div>
            <div id="forecastChart" style="height: 350px;"></div>
        </div>

        <div class="card card-half" id="historyResult">
            <div class="chart-header">
                <div class="chart-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2"><path d="M12 20V10M18 20V4M6 20v-4"/></svg>
                    HISTORICAL BASELINE
                </div>
                <div class="chart-toolbar" id="historyToolbar">
                    <button class="btn-range" data-count="1" data-step="month">1M</button>
                    <button class="btn-range" data-count="6" data-step="month">6M</button>
                    <button class="btn-range active" data-count="1" data-step="year">1Y</button>
                    <button class="btn-range" data-count="2" data-step="year">2Y</button>
                    <button class="btn-range" data-count="5" data-step="year">5Y</button>
                    <button class="btn-range" data-step="all">ALL</button>
                </div>
            </div>
            <div id="historyOnlyChart" style="height: 350px;"></div>
        </div>
    </section>
</main>

<div id="industrial-tooltip" class="smart-tooltip"></div>

<script src="app.js"></script>
</body>
</html>
